services:
  # ----------------------------------------
  # MySQL 8.4
  # ----------------------------------------
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.4
    container_name: starter-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: starter_db
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./doc/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-connect='SET NAMES utf8mb4'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Redis 7
  # ----------------------------------------
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: starter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # 若 REDIS_PASSWORD 非空则启用密码保护，否则无密码模式（本地开发默认）
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
               exec redis-server --requirepass "$$REDIS_PASSWORD";
             else
               exec redis-server;
             fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Nginx (reverse proxy)
  # ----------------------------------------
  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: starter-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  # ----------------------------------------
  # Backend (Spring Boot)
  # ----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starter-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      LOG_HOME: /tmp/logs
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/starter_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8090
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      SPRING_CACHE_TYPE: redis
    entrypoint:
      [
        "sh",
        "-c",
        "cd /home/appuser && mkdir -p logs && exec java -jar /app/app.jar",
      ]
    depends_on:
      mysql:
        condition: service_healthy

  # ----------------------------------------
  # Frontend (Nginx serve build assets)
  # ----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: starter-frontend
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  default:
    name: starter-network
