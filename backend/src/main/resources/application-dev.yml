# ====================================
# Development Environment
# ====================================
spring:
  # DataSource
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/starter_db?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Cache
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      key-prefix: "starter:"
      use-key-prefix: true

# ====================================
# JWT Configuration
# ====================================
jwt:
  secret: dev-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 3600000     # 1 hour
  refresh-token-expiration: 604800000  # 7 days

# ====================================
# Logging
# ====================================
logging:
  level:
    root: INFO
    com.music163.starter: DEBUG
    org.springframework.security: DEBUG

# ====================================
# MyBatis-Plus（开发环境 SQL 日志）
# ====================================
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ====================================
# CORS
# ====================================
app:
  cors:
    allowed-origins: "http://localhost:5173"
