# ====================================
# Development Environment
# ====================================
spring:
  # DataSource
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/starter_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    # 仅用于本地开发，生产环境通过 DB_PASSWORD 环境变量覆盖
    password: ${DB_PASSWORD:root123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      # 留空 = 无密码（本地开发默认）；生产环境通过 REDIS_PASSWORD 环境变量覆盖
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Cache
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      key-prefix: "starter:"
      use-key-prefix: true

# ====================================
# JWT Configuration
# ====================================
jwt:
  # ⚠️ 开发专用密钥，禁止用于生产环境。生产环境通过 JWT_SECRET 环境变量注入
  secret: ${JWT_SECRET:dev-jwt-insecure-do-not-use-in-prod}
  access-token-expiration: 3600000     # 1 hour
  refresh-token-expiration: 604800000  # 7 days

# ====================================
# Logging
# ====================================
logging:
  level:
    root: INFO
    com.music163.starter: DEBUG
    org.springframework.security: DEBUG

# ====================================
# MyBatis-Plus（开发环境 SQL 日志）
# ====================================
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ====================================
# CORS
# ====================================
app:
  cors:
    allowed-origins: "http://localhost:5173"
